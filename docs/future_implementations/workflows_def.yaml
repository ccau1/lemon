default:
  steps:
  - id: "spec"
    name: "Spec"
    approval:
      enabled: true # If true, we await review or skip if auto-approve true. If false, just always skip approval, jump straight to next step.
      defaultAutoApprove: false
    runPrompts:
    - "You are an expert product manager. Write a clear, concise product spec in markdown. Use the following sections with ATX headings: # Title, ## Overview, ## In Scope, ## Out of Scope, ## Technical Requirements, ## File Structure, ## Acceptance Criteria. Use bullet lists under each section. Wrap file trees in triple backticks. Use the provided workspace context (README, docs, config files) to keep the spec realistic for the existing codebase. Do not include preamble like 'Here is the final spec:'; output only the markdown. If anything is unclear and you need to ask a clarifying question before writing the spec, respond with ONLY the text \"QUESTION: <your question here>\". Otherwise, write the complete spec."
    contextGlobs:
    - README.md
    - docs/**/*.md
    - package.json
    - .lemon/tickets/*/spec.md
    model: kimi-code
  - id: "plan"
    name: "Plan"
    approval:
      enabled: true # If true, we await review or skip if auto-approve true. If false, just always skip approval, jump straight to next step.
      defaultAutoApprove: false
    runPrompts:
    - "You are a senior software architect. Given a spec, write a high-level implementation plan in markdown. Use the following sections with ATX headings: # Title, ## Overview, ## Key Files / Changes, ## Step-by-step Implementation, ## Testing Strategy, ## Risks and Considerations. Use bullet lists and numbered lists where appropriate. Wrap file trees or code snippets in triple backticks. Do not include preamble like 'Here is the plan:'; output only the markdown. If anything is unclear and you need to ask a clarifying question before writing the plan, respond with ONLY the text \"QUESTION: <your question here>\". Otherwise, write the complete plan."
    contextGlobs:
    - README.md
    - docs/**/*.md
    - package.json
    - .lemon/tickets/*/spec.md
    - .lemon/tickets/*/plan.md
    model: kimi-code
  - id: "tasks"
    name: "Tasks"
    approval:
      enabled: true # If true, we await review or skip if auto-approve true. If false, just always skip approval, jump straight to next step.
      defaultAutoApprove: false
    runPrompts:
    - |
      You are a project manager. Given a plan, break it into a list of implementation tasks. Return a markdown checklist, one task per line, like:
      - [ ] First task
      - [ ] Second task
      Do not include preamble; output only the markdown checklist. If anything is unclear and you need to ask a clarifying question before writing the tasks, respond with ONLY the text "QUESTION: <your question here>"."
    contextGlobs:
    - README.md
    - docs/**/*.md
    - .lemon/tickets/*/plan.md
    - .lemon/tickets/*/tasks.md
    model: kimi-code
  - id: "implement"
    name: "Implement"
    approval:
      enabled: true # If true, we await review or skip if auto-approve true. If false, just always skip approval, jump straight to next step.
      defaultAutoApprove: false
    runPrompts:
    - |
      You are a project manager. Given a plan, break it into a list of implementation tasks. Return a markdown checklist, one task per line, like:
      - [ ] First task
      - [ ] Second task
      Do not include preamble; output only the markdown checklist. If anything is unclear and you need to ask a clarifying question before writing the tasks, respond with ONLY the text "QUESTION: <your question here>"."
    contextGlobs:
    - README.md
    - docs/**/*.md
    - .lemon/tickets/*/plan.md
    - .lemon/tickets/*/tasks.md
    model: kimi-code
